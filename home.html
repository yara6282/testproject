<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkateHub - Home</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="./style/global.css">
    <link rel="stylesheet" href="./style/home.css">
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <a href="home.html" class="logo-link">
                <img src="./image/9037278.png" alt="SkateHub Logo">
                <span class="site-title">SkateHub</span>
            </a>
        </div>

        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="events.html">Events</a>
            <a href="community.html">Community</a>
            <a href="shop.html">Shop</a>
            <a href="tutorials.html">Tutorials</a>
        </div>

        <div class="nav-icons">
            <a href="login.html"><i class="fas fa-user"></i></a>
            <a href="signup.html"><i class="fas fa-user-plus"></i></a>
            <a href="notifications.html"><i class="fas fa-bell"></i></a>
        </div>
    </div>

    <div class="slider">
        <div class="slides" id="slides">
            <a href="event1.html"><img src="wallpaperflare.com_wallpaper.jpg" alt="Event 1"></a>
            <a href="event2.html"><img src="pexels-jvbncncj-2719301.jpg" alt="Event 2"></a>
            <a href="event3.html"><img src="pexels-minan1398-1406866.jpg" alt="Event 3"></a>
        </div>
    </div>

    <div class="shop-preview">
        <h2>Skater’s Choice</h2>
        <div class="products">
            <div class="product-card">
                <img src="./image/47_007c3a40-5a29-4b2f-bd90-e7462162897d.png" alt="Skateboard">
                <h3>Pro Skateboard</h3>
                <p>$120</p>
                <button>View</button>
            </div>
            <div class="product-card">
                <img src="./image/skate-t-shirt-bigflip-grey-men.webp " alt="T-shirt">
                <h3>Skate T-Shirt</h3>
                <p>$25</p>
                <button>View</button>
            </div>
            <div class="product-card">
                <img src="./image/2000015_CLASSIC_SKATE_MATBLK_F_R_1500x.jpg" alt="Helmet">
                <h3>Safety Helmet</h3>
                <p>$45</p>
                <button>View</button>
            </div>
        </div>
    </div>

    <div class="tutorial-section" style="width:90%; margin:40px auto; text-align:center;">
        <h2 style="font-size:40px; margin-bottom:20px; text-shadow:2px 2px 4px #8B0000;">Learn Skating Basics</h2>
        <div style="display:flex; justify-content:space-around; flex-wrap:wrap; gap:20px;">
            <iframe width="30%" height="180" src="https://www.youtube.com/embed/p3NXd3DhH08?start=22" style="border-radius:10px; min-width:280px;"></iframe>
            <iframe width="30%" height="180" src="https://www.youtube.com/embed/0wepmbVVgYQ" style="border-radius:10px; min-width:280px;"></iframe>
            <iframe width="30%" height="180" src="https://www.youtube.com/embed/JwEfq-OafFA" style="border-radius:10px; min-width:280px;"></iframe>
        </div>
        <p style="margin-top:20px; font-size:20px; color:#ddd;">
            Your journey starts here. <a href="tutorials.html" style="color:#00aced; font-weight:bold;">Click here</a> for more!
        </p>
    </div>

    <div class="community-section" style="width:90%; margin:60px auto; text-align:center;">
        <h2 style="font-size:40px; margin-bottom:20px; text-shadow:2px 2px 4px #8B0000;">Our Community</h2>
        <div style="display:flex; justify-content:space-around; flex-wrap:wrap; gap:20px;">
            <div class="product-card"><img src="community1.jpg" alt="Events"><h3>Local Events</h3></div>
            <div class="product-card"><img src="community2.jpg" alt="Groups"><h3>Skater Groups</h3></div>
            <div class="product-card"><img src="community3.jpg" alt="Stories"><h3>Success Stories</h3></div>
        </div>
    </div>

    <script src="./java/slider.js"></script>
</body>
</html>
